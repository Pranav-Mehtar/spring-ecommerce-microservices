# ===========================
# PostgreSQL Configuration
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5433/ecommerce_db
spring.datasource.username=postgres
spring.datasource.password=pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# JWT Configuration
# ===========================
# Secret key (change this to a strong random string in production!)
jwt.secret=ecommerce_super_secret_key_change_this_in_production_must_be_256bits
jwt.expiration=86400000
# 86400000 ms = 24 hours

# ===========================
# Server
# ===========================
server.port=8080
